name: CI/CD pipeline to deploy application

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_SECRET }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: aqib2110/node-test-image:${{ github.sha }}

      - name: Update deployment manifest
        run: |
          git clone https://github.com/Aqib2110/node-test-application.git
          cd node-test-application

         
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          
          sed -i "s|image: aqib2110/node-test-image:.*|image: aqib2110/node-test-image:${{ github.sha }}|" deployment.yaml

          git add deployment.yaml
          git commit -m "Update image to ${{ github.sha }}"
          git push https://${{ secrets.PAT }}@github.com/Aqib2110/node-test-application.git